services:
  - type: web
    name: haven-v2-api
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: ./scripts/run-prod.sh
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ABUSE_GUARD_STORE_BACKEND
        value: redis
      - key: ABUSE_GUARD_REDIS_URL
        sync: false
      - key: ABUSE_GUARD_REDIS_KEY_PREFIX
        value: haven:abuse
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
