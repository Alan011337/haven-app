[pytest]
faulthandler_timeout = 120
markers =
    unit: Fast isolated unit tests.
    integration: Tests requiring DB/session/service integration.
    contract: Policy/workflow contract tests.
    slow: Long-running tests not required for every local loop.
filterwarnings =
    ignore:Accessing argon2.__version__ is deprecated and will be removed in a future release.*:DeprecationWarning:passlib.handlers.argon2
