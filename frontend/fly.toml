app = "haven-web-prod"
primary_region = "nrt"

[build]

  [build.args]
    NEXT_PUBLIC_API_URL = "https://haven-web-prod.fly.dev/api"
    NEXT_PUBLIC_WS_URL = "wss://haven-api-prod.fly.dev"
    API_PROXY_TARGET = "http://haven-api-prod.internal:8080/api"

[env]
  NODE_ENV = "production"
  HOSTNAME = "0.0.0.0"
  PORT = "3000"
  NEXT_PUBLIC_API_URL = "https://haven-web-prod.fly.dev/api"
  NEXT_PUBLIC_WS_URL = "wss://haven-api-prod.fly.dev"
  API_PROXY_TARGET = "http://haven-api-prod.internal:8080/api"

[processes]
  app = "npm run start -- -p 3000 -H 0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 80

  [[http_service.checks]]
    method = "GET"
    path = "/"
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
  processes = ["app"]
