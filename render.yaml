# ARCHIVED DEPLOY BLUEPRINT
# Haven production deploy source-of-truth is Fly.io (`backend/fly.toml`, `frontend/fly.toml`).
# Keep this file only for historical reference and rollback notes.
services:
  - type: web
    name: haven-v2-api
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: ./scripts/run-prod.sh
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ABUSE_GUARD_STORE_BACKEND
        value: redis
      - key: ABUSE_GUARD_REDIS_URL
        sync: false
      - key: ABUSE_GUARD_REDIS_KEY_PREFIX
        value: haven:abuse
      - key: AI_ROUTER_SHARED_STATE_BACKEND
        value: redis
      - key: AI_ROUTER_REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: NOTIFICATION_OUTBOX_ENABLED
        value: "true"

  - type: cron
    name: haven-billing-webhook-retry
    runtime: python
    rootDir: backend
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONUTF8=1 PYTHONPATH=. python scripts/run_billing_webhook_retry_dispatch.py --limit 200
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false

  - type: cron
    name: haven-notification-outbox-dispatch
    runtime: python
    rootDir: backend
    schedule: "*/2 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONUTF8=1 PYTHONPATH=. python scripts/run_notification_outbox_dispatch.py --limit 200
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: NOTIFICATION_OUTBOX_ENABLED
        value: "true"

  - type: cron
    name: haven-notification-outbox-cleanup
    runtime: python
    rootDir: backend
    schedule: "0 4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONUTF8=1 PYTHONPATH=. python scripts/run_notification_outbox_cleanup.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
