services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HAVEN_LOCAL_DEV_POSTGRES_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: "${HAVEN_LOCAL_DEV_POSTGRES_DATABASE:-haven_local}"
      POSTGRES_USER: "${HAVEN_LOCAL_DEV_POSTGRES_USER:-haven}"
      POSTGRES_PASSWORD: "${HAVEN_LOCAL_DEV_POSTGRES_PASSWORD:-haven_local_dev}"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "${HAVEN_LOCAL_DEV_POSTGRES_USER:-haven}" -d "${HAVEN_LOCAL_DEV_POSTGRES_DATABASE:-haven_local}"
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    volumes:
      - haven-local-postgres-data:/var/lib/postgresql/data

volumes:
  haven-local-postgres-data:
