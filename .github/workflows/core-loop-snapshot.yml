name: Core Loop Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read

jobs:
  core-loop-snapshot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test.db
      OPENAI_API_KEY: test-key
      SECRET_KEY: 01234567890123456789012345678901
      ABUSE_GUARD_STORE_BACKEND: memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate core loop snapshot evidence
        run: |
          python scripts/run_core_loop_snapshot.py \
            --window-days 1 \
            --output docs/growth/evidence/core-loop-snapshot-${GITHUB_RUN_ID}.json \
            --latest-path docs/growth/evidence/core-loop-snapshot-latest.json

      - name: Core loop snapshot summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("docs/growth/evidence/core-loop-snapshot-latest.json")
          lines = ["### Daily Core Loop Snapshot"]
          if not summary_path.exists():
              lines.append("- result: `unavailable`")
              lines.append("- reason: `snapshot_missing`")
          else:
              payload = json.loads(summary_path.read_text(encoding="utf-8"))
              snapshot = payload.get("snapshot") or {}
              counts = snapshot.get("counts") or {}
              metrics = snapshot.get("metrics") or {}
              evaluation = payload.get("evaluation") or {}
              reasons = evaluation.get("reasons") or []
              lines.append(f"- evaluation_status: `{evaluation.get('status', 'unknown')}`")
              lines.append(f"- active_users_total: `{counts.get('active_users_total', 'unknown')}`")
              lines.append(
                  f"- loop_completed_users_total: `{counts.get('loop_completed_users_total', 'unknown')}`"
              )
              lines.append(
                  f"- daily_loop_completion_rate: `{metrics.get('daily_loop_completion_rate', 'unknown')}`"
              )
              lines.append(
                  f"- dual_reveal_pair_rate: `{metrics.get('dual_reveal_pair_rate', 'unknown')}`"
              )
              lines.append("- reasons: `" + (", ".join(str(reason) for reason in reasons) if reasons else "none") + "`")

          summary_text = "\n".join(lines) + "\n"
          github_step_summary = os.getenv("GITHUB_STEP_SUMMARY")
          if github_step_summary:
              with open(github_step_summary, "a", encoding="utf-8") as fp:
                  fp.write(summary_text)
          print(summary_text)
          PY

      - name: Upload core loop snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-loop-snapshot
          path: |
            docs/growth/evidence/core-loop-snapshot-*.json
            docs/growth/evidence/core-loop-snapshot-latest.json
          if-no-files-found: error
