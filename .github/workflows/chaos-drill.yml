name: Chaos Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 5"

permissions:
  contents: read
  issues: write

jobs:
  chaos-drill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./chaos-drill.db
      OPENAI_API_KEY: test-key
      SECRET_KEY: 01234567890123456789012345678901
      ABUSE_GUARD_STORE_BACKEND: memory
      CHAOS_DRILL_ENV: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run chaos drill
        id: drill
        continue-on-error: true
        run: |
          python scripts/run_chaos_drill_audit.py
          python scripts/validate_security_evidence.py --kind chaos-drill --contract-mode strict

      - name: Upload chaos drill evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-drill-evidence
          path: docs/security/evidence/chaos-drill-*
          if-no-files-found: warn

      - name: Open or Update Alert Issue
        if: steps.drill.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const titlePrefix = "[P0][Resilience] Chaos drill failed";
            const today = new Date().toISOString().slice(0, 10);
            const title = `${titlePrefix} (${today})`;
            const body = [
              "Chaos drill failed in CI.",
              "",
              `- Workflow run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
              "",
              "Please inspect the uploaded `chaos-drill-evidence` artifact and update incident controls before the next release."
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title.startsWith(titlePrefix));
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Fail Job on Drill Failure
        if: steps.drill.outcome == 'failure'
        run: exit 1
