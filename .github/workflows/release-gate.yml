              meta = payload.get("meta") or {}
              lines.append(f"- result: `{result}`")
              lines.append(f"- failure_class: `{meta.get('failure_class', 'unknown')}`")
              lines.append(f"- evidence_result: `{meta.get('result', 'unknown')}`")
              lines.append(f"- evidence_age_hours: `{meta.get('age_hours', 'unknown')}`")
              if reasons:
                  lines.append("- reasons: `" + ", ".join(str(reason) for reason in reasons) + "`")
              else:
                  lines.append("- reasons: `none`")

          summary_text = "\n".join(lines) + "\n"
          github_step_summary = os.getenv("GITHUB_STEP_SUMMARY")
          if github_step_summary:
              with open(github_step_summary, "a", encoding="utf-8") as fp:
                  fp.write(summary_text)
          print(summary_text)
          PY

      - name: Launch signoff gate summary
        if: always() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_file = Path("/tmp/launch-signoff-gate-summary.json")
          lines = ["### Launch signoff artifact gate"]

          if not summary_file.exists():
              lines.append("- result: `unavailable`")
              lines.append("- reason: `summary_file_missing`")
          else:
              payload = json.loads(summary_file.read_text(encoding="utf-8"))
              result = payload.get("result", "unknown")
              reasons = payload.get("reasons") or []
              meta = payload.get("meta") or {}
              lines.append(f"- result: `{result}`")
              lines.append(f"- overall_ready: `{meta.get('overall_ready', 'unknown')}`")
              lines.append(f"- artifact_age_hours: `{meta.get('age_hours', 'unknown')}`")
              if reasons:
                  lines.append("- reasons: `" + ", ".join(str(reason) for reason in reasons) + "`")
              else:
                  lines.append("- reasons: `none`")

          summary_text = "\n".join(lines) + "\n"
          github_step_summary = os.getenv("GITHUB_STEP_SUMMARY")
          if github_step_summary:
              with open(github_step_summary, "a", encoding="utf-8") as fp:
                  fp.write(summary_text)
          print(summary_text)
          PY

  frontend-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      CONTENT_REVIEW_MAX_COPILOT_WEAK: "180"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Frontend env check
        run: npm run check:env

      - name: Frontend API contract types check
        run: npm run contract:types:check

      - name: Frontend lint
        run: npm run lint

      - name: Frontend typecheck
        run: TYPECHECK_TIMEOUT_MS=180000 npm run typecheck

      - name: Deck content review gate
        run: npm run seed:cards:review

  # P0-I: CUJ e2e (smoke). PR allows soft-fail; main is required.
  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      E2E_BASE_URL: http://localhost:3000
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/frontend/.playwright-browsers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q 200 && break
            sleep 2
          done

      - name: Run e2e (smoke + a11y axe)
        run: |
          set +e
          npm run test:e2e 2>&1 | tee /tmp/frontend-e2e.log
          e2e_exit_code=${PIPESTATUS[0]}
          echo "E2E_EXIT_CODE=${e2e_exit_code}" >> "$GITHUB_ENV"
          exit "${e2e_exit_code}"

      - name: Frontend e2e summary
        if: always()
        run: |
          node scripts/summarize-e2e-result.mjs \
            --log-path /tmp/frontend-e2e.log \
            --exit-code "${E2E_EXIT_CODE:-}" \
            --summary-path /tmp/frontend-e2e-summary.json \
            --summary-title "Frontend e2e smoke" \
            --markdown-summary-path "${GITHUB_STEP_SUMMARY:-}"

      - name: Frontend e2e summary schema gate
        if: always()
        run: |
          node scripts/check-e2e-summary-schema.mjs \
            --summary-path /tmp/frontend-e2e-summary.json \
            --required-schema-version v1

      - name: Upload frontend e2e log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-log
          path: /tmp/frontend-e2e.log
          if-no-files-found: ignore

      - name: Upload frontend e2e summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-summary
          path: /tmp/frontend-e2e-summary.json
          if-no-files-found: ignore
    continue-on-error: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
