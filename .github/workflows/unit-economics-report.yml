name: Unit Economics Report

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 1"

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  unit-economics-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test.db
      OPENAI_API_KEY: test-key
      SECRET_KEY: 01234567890123456789012345678901
      ABUSE_GUARD_STORE_BACKEND: memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate unit economics report
        id: fin_report
        continue-on-error: true
        run: PYTHONUTF8=1 PYTHONPATH=. python scripts/run_unit_economics_report.py --fail-on-warning

      - name: Validate report artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("../docs/security/unit-economics-report.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          assert payload.get("artifact_kind") == "unit-economics-report"
          assert isinstance(payload.get("active_couples"), int)
          assert "computed" in payload
          print("unit economics report validated")
          PY

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-economics-report
          path: docs/security/unit-economics-report.json

      - name: Open or Update Alert Issue
        if: steps.fin_report.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const titlePrefix = "[P1][FIN] Unit economics report health=warning";
            const today = new Date().toISOString().slice(0, 10);
            const title = `${titlePrefix} (${today})`;
            const body = [
              "Scheduled unit economics report returned health=warning (blended cost per couple >= threshold).",
              "",
              `- Workflow run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
              "",
              "Action items:",
              "1) Inspect unit-economics-report artifact for cost breakdown.",
              "2) Review active couples count and variable cost assumptions.",
              "3) Consider pricing or cost optimization per runbook."
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title.startsWith(titlePrefix));
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Fail Job on Report Warning
        if: steps.fin_report.outcome == 'failure'
        run: exit 1
