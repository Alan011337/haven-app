name: API Inventory Owner Attestation

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 1 * *"

permissions:
  contents: read
  issues: write

jobs:
  api-inventory-attestation:
    runs-on: ubuntu-latest
    env:
      API_INVENTORY_ATTESTATION_MIN_DAYS_REMAINING: 14
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check owner attestation freshness
        id: attestation
        continue-on-error: true
        run: python scripts/check_api_inventory_owner_attestation.py

      - name: Open or Update Alert Issue
        if: steps.attestation.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const titlePrefix = "[P0][Security] API inventory owner attestation stale";
            const today = new Date().toISOString().slice(0, 10);
            const title = `${titlePrefix} (${today})`;
            const body = [
              "API inventory owner attestation check failed in CI.",
              "",
              `- Workflow run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
              "",
              "Please refresh owner attestations in `docs/security/api-inventory-owner-attestation.json` and keep `.github/CODEOWNERS` synchronized."
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title.startsWith(titlePrefix));
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Fail Job on Attestation Failure
        if: steps.attestation.outcome == 'failure'
        run: exit 1
