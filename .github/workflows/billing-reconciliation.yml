name: Billing Reconciliation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  billing-reconciliation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./billing-reconciliation.db
      OPENAI_API_KEY: test-key
      SECRET_KEY: 01234567890123456789012345678901
      ABUSE_GUARD_STORE_BACKEND: memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Apply DB migrations
        run: alembic upgrade head

      - name: Run reconciliation audit
        id: audit
        continue-on-error: true
        run: |
          python scripts/run_billing_reconciliation_audit.py
          python scripts/validate_security_evidence.py --kind billing-reconciliation --contract-mode strict

      - name: Upload reconciliation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: billing-reconciliation-evidence
          path: docs/security/evidence/billing-reconciliation-*
          if-no-files-found: warn

      - name: Open or Update Alert Issue
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const titlePrefix = "[P0][Billing] Reconciliation audit failed";
            const today = new Date().toISOString().slice(0, 10);
            const title = `${titlePrefix} (${today})`;
            const body = [
              "Billing reconciliation audit failed in CI.",
              "",
              `- Workflow run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
              "",
              "Please inspect the uploaded `billing-reconciliation-evidence` artifact and fix missing ledger linkage / entitlement inconsistency before next release."
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title.startsWith(titlePrefix));
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Fail Job on Audit Failure
        if: steps.audit.outcome == 'failure'
        run: exit 1
