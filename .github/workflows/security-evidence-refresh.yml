name: Security Evidence Refresh

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:

jobs:
  refresh-security-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh CUJ, billing reconciliation, and audit retention evidence
        env:
          OPENAI_API_KEY: test-key
          SECRET_KEY: 01234567890123456789012345678901
          ABUSE_GUARD_STORE_BACKEND: memory
          PYTHONUTF8: "1"
          PYTHONPATH: ./backend
        run: |
          bash scripts/generate-cuj-synthetic-evidence-local.sh
          bash scripts/billing-reconciliation.sh
          bash scripts/audit-log-retention.sh

      - name: Upload refreshed security evidence
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence-refresh-artifacts
          path: |
            docs/security/evidence/billing-reconciliation-*.json
            docs/security/evidence/billing-reconciliation-*.md
            docs/security/evidence/audit-log-retention-*.json
            docs/security/evidence/audit-log-retention-*.md
            docs/sre/evidence/cuj-synthetic-*.json
            docs/sre/evidence/cuj-synthetic-*.md
