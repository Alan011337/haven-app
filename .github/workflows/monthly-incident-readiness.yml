name: Monthly Incident Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read
  issues: write

jobs:
  monthly-incident-readiness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./monthly-incident-readiness.db
      OPENAI_API_KEY: test-key
      SECRET_KEY: 01234567890123456789012345678901
      ABUSE_GUARD_STORE_BACKEND: memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate monthly incident drill evidence
        id: readiness
        continue-on-error: true
        run: |
          python scripts/validate_security_evidence.py --kind p0-drill --contract-mode strict
          python scripts/validate_security_evidence.py --kind data-rights-fire-drill --contract-mode strict
          python scripts/validate_security_evidence.py --kind chaos-drill --contract-mode strict
          python scripts/validate_security_evidence.py --kind backup-restore-drill --contract-mode strict

      - name: Upload drill evidence index
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-incident-readiness-evidence
          path: docs/security/evidence/*.json
          if-no-files-found: warn

      - name: Open or Update Alert Issue
        if: steps.readiness.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const titlePrefix = "[P0][Incident Readiness] Monthly readiness failed";
            const today = new Date().toISOString().slice(0, 10);
            const title = `${titlePrefix} (${today})`;
            const body = [
              "Monthly incident readiness validation failed in CI.",
              "",
              `- Workflow run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
              "",
              "Runbook links:",
              "- Incident response: docs/ops/incident-response-playbook.md",
              "- Data rights: docs/legal/data-rights.md",
              "- Release checklist: RELEASE_CHECKLIST.md",
              "",
              "Please refresh missing drill evidence and fix failing readiness gates before next release."
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title.startsWith(titlePrefix));
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Close stale readiness issue when passing
        if: steps.readiness.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const titlePrefix = "[P0][Incident Readiness] Monthly readiness failed";
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title.startsWith(titlePrefix));
            if (!existing) {
              return;
            }
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: "Monthly readiness check is green. Closing this alert issue.",
            });
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed",
            });

      - name: Fail Job on Readiness Failure
        if: steps.readiness.outcome == 'failure'
        run: exit 1
